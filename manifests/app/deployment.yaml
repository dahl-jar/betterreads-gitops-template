# //////////////////////////////////////////////////////////////////////////
# APP
# Single-replica Deployment, non-root, read-only rootfs
# //////////////////////////////////////////////////////////////////////////
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app
  namespace: app
  labels:
    app.kubernetes.io/name: app
    app.kubernetes.io/part-of: app
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: app
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: app
        app.kubernetes.io/part-of: app
    spec:
      imagePullSecrets:
        - name: ghcr-pull
      automountServiceAccountToken: false
      # preStop drains the single replica before exit so a rollout does not 5xx.
      terminationGracePeriodSeconds: 40
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: app
          image: ghcr.io/your-org/app:latest
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          lifecycle:
            preStop:
              exec:
                command: ["sleep", "15"]
          ports:
            - name: http
              containerPort: 8080
            - name: mgmt
              containerPort: 8081
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secrets
          env:
            # Pull only the scoped keys by name; the minio secret also holds root.
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: app-minio
                  key: MINIO_ACCESS_KEY
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: app-minio
                  key: MINIO_SECRET_KEY
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              memory: 1536Mi
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 20
            failureThreshold: 5
            timeoutSeconds: 3
          volumeMounts:
            - { name: tmp, mountPath: /tmp }
      volumes:
        - { name: tmp, emptyDir: {} }
