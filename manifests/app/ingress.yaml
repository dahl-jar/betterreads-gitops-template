# //////////////////////////////////////////////////////////////////////////
# APP INGRESS
# Host-routed to the app Service by Traefik
# //////////////////////////////////////////////////////////////////////////
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: app
  namespace: app
  labels:
    app.kubernetes.io/part-of: app
spec:
  ingressClassName: traefik
  rules:
    - host: api.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: app
                port:
                  number: 80
