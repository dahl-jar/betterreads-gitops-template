# //////////////////////////////////////////////////////////////////////////
# APP CONFIG
# Non-secret env: service DNS, ports, CORS origins
# //////////////////////////////////////////////////////////////////////////
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: app
  labels:
    app.kubernetes.io/part-of: app
data:
  DB_HOST: postgres.app.svc.cluster.local
  DB_PORT: "5432"
  DB_NAME: app
  DB_USERNAME: app
  DB_SSL_MODE: disable
  REDIS_HOST: redis.app.svc.cluster.local
  REDIS_PORT: "6379"
  # Actuator bound pod-wide; reachable only via the headless mgmt Service.
  MANAGEMENT_SERVER_ADDRESS: 0.0.0.0
  MEILISEARCH_HOST: http://meilisearch.app.svc.cluster.local:7700
  MEILISEARCH_INDEX_NAME: items
  MINIO_ENDPOINT: http://minio.app.svc.cluster.local:9000
  MINIO_BUCKET: app-images
  SERVER_PORT: "8080"
  APP_CORS_ALLOWED_ORIGINS: "https://example.com,http://localhost:5173"
  APP_BASE_URL: https://example.com
