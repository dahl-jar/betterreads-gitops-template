apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# CI rewrites newTag; Argo CD syncs the commit and rolls the app.
images:
  - name: ghcr.io/your-org/app
    newTag: latest

# The *sealedsecret.yaml files come from ./seal-secrets.sh and ./seal-minio.sh.
resources:
  - namespace.yaml
  - configmap.yaml
  - sealedsecret.yaml
  - deployment.yaml
  - service.yaml
  - ingress.yaml
  - postgres/sealedsecret.yaml
  - postgres/statefulset.yaml
  - postgres/service.yaml
  - postgres/exporter.yaml
  - postgres/backup-sealedsecret.yaml
  - postgres/backup-cronjob.yaml
  - redis/statefulset.yaml
  - redis/service.yaml
  - meilisearch/sealedsecret.yaml
  - meilisearch/statefulset.yaml
  - meilisearch/service.yaml
  - minio/sealedsecret.yaml
  - minio/statefulset.yaml
  - minio/service.yaml
  - minio/minio-setup-job.yaml
  - networkpolicy.yaml
