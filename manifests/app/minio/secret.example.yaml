# Root pair runs MinIO; the app keys become the scoped user from minio-setup.
# Seal with ../seal-minio.sh. Do not commit this file.
apiVersion: v1
kind: Secret
metadata:
  name: app-minio
  namespace: app
type: Opaque
stringData:
  MINIO_ROOT_USER: CHANGE_ME
  MINIO_ROOT_PASSWORD: CHANGE_ME
  MINIO_ACCESS_KEY: CHANGE_ME
  MINIO_SECRET_KEY: CHANGE_ME
