# //////////////////////////////////////////////////////////////////////////
# MINIO SETUP
# PostSync Job: create the bucket and a scoped user
# //////////////////////////////////////////////////////////////////////////
apiVersion: batch/v1
kind: Job
metadata:
  name: minio-setup
  namespace: app
  labels:
    app.kubernetes.io/name: minio-setup
    app.kubernetes.io/part-of: app
  annotations:
    # PostSync hook; idempotent, deletes itself on success.
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app.kubernetes.io/name: minio-setup
        app.kubernetes.io/part-of: app
    spec:
      restartPolicy: OnFailure
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: mc
          image: minio/mc:latest
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          env:
            - name: MC_CONFIG_DIR
              value: /tmp/.mc
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: app-minio
                  key: MINIO_ROOT_USER
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-minio
                  key: MINIO_ROOT_PASSWORD
            - name: APP_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: app-minio
                  key: MINIO_ACCESS_KEY
            - name: APP_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: app-minio
                  key: MINIO_SECRET_KEY
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              mc alias set local http://minio.app.svc.cluster.local:9000 \
                "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD"
              mc mb --ignore-existing local/app-images
              mc quota set local/app-images --size 10GB
              cat > /tmp/app-policy.json <<'EOF'
              {
                "Version": "2012-10-17",
                "Statement": [
                  {
                    "Effect": "Allow",
                    "Action": ["s3:GetObject", "s3:PutObject", "s3:DeleteObject"],
                    "Resource": ["arn:aws:s3:::app-images/*"]
                  },
                  {
                    "Effect": "Allow",
                    "Action": ["s3:ListBucket", "s3:GetBucketLocation"],
                    "Resource": ["arn:aws:s3:::app-images"]
                  }
                ]
              }
              EOF
              mc admin policy rm local app-rw || true
              mc admin policy create local app-rw /tmp/app-policy.json
              mc admin user add local "$APP_ACCESS_KEY" "$APP_SECRET_KEY"
              mc admin policy attach local app-rw --user "$APP_ACCESS_KEY" || true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 128Mi
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 16Mi
