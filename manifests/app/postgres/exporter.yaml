# //////////////////////////////////////////////////////////////////////////
# POSTGRES EXPORTER
# Prometheus metrics exporter and its Service
# //////////////////////////////////////////////////////////////////////////
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-exporter
  namespace: app
  labels:
    app.kubernetes.io/name: postgres-exporter
    app.kubernetes.io/part-of: app
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: postgres-exporter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgres-exporter
        app.kubernetes.io/part-of: app
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: exporter
          image: quay.io/prometheuscommunity/postgres-exporter:v0.17.1
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          env:
            # v0.17 needs a full DATA_SOURCE_NAME URI; built via $(VAR) expansion.
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: DB_PASSWORD
            - name: DATA_SOURCE_NAME
              value: postgresql://app:$(DB_PASSWORD)@postgres.app.svc.cluster.local:5432/app?sslmode=disable
          ports:
            - name: metrics
              containerPort: 9187
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /
              port: metrics
            initialDelaySeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-exporter
  namespace: app
  labels:
    app.kubernetes.io/name: postgres-exporter
    app.kubernetes.io/part-of: app
spec:
  selector:
    app.kubernetes.io/name: postgres-exporter
  ports:
    - name: metrics
      port: 9187
      targetPort: metrics
