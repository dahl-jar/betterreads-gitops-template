# //////////////////////////////////////////////////////////////////////////
# POSTGRES SERVICE
# Headless Service for the StatefulSet
# //////////////////////////////////////////////////////////////////////////
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: app
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: app
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
