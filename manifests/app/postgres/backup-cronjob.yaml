# //////////////////////////////////////////////////////////////////////////
# POSTGRES BACKUP
# Daily dump: gzip, gpg, push to S3-compatible storage
# //////////////////////////////////////////////////////////////////////////
apiVersion: batch/v1
kind: CronJob
metadata:
  name: postgres-backup
  namespace: app
  labels:
    app.kubernetes.io/name: postgres-backup
    app.kubernetes.io/part-of: app
spec:
  # 03:00 UTC daily. The script takes an extra weekly copy on Sundays.
  schedule: "0 3 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      backoffLimit: 2
      ttlSecondsAfterFinished: 86400
      template:
        metadata:
          labels:
            app.kubernetes.io/name: postgres-backup
        spec:
          restartPolicy: Never
          automountServiceAccountToken: false
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            seccompProfile:
              type: RuntimeDefault
          containers:
            # Any image with pg_dump, gzip, gpg, and rclone.
            - name: backup
              image: ghcr.io/your-org/postgres-backup:latest
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop: ["ALL"]
              volumeMounts:
                - { name: tmp, mountPath: /tmp }
                - { name: rclone-config, mountPath: /home/pgbackup/.config/rclone }
                - { name: gnupg, mountPath: /home/pgbackup/.gnupg }
              env:
                - name: GNUPGHOME
                  value: /home/pgbackup/.gnupg
                - name: DB_HOST
                  value: postgres.app.svc.cluster.local
                - name: DB_NAME
                  value: app
                - name: DB_USERNAME
                  value: app
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: app-secrets
                      key: DB_PASSWORD
                - name: BACKUP_GPG_PASSPHRASE
                  valueFrom:
                    secretKeyRef:
                      name: app-backup
                      key: gpg_passphrase
                - name: S3_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: app-backup
                      key: s3_access_key_id
                - name: S3_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: app-backup
                      key: s3_secret_access_key
                - name: S3_BUCKET
                  valueFrom:
                    secretKeyRef:
                      name: app-backup
                      key: s3_bucket
                - name: S3_ENDPOINT
                  valueFrom:
                    secretKeyRef:
                      name: app-backup
                      key: s3_endpoint
              args:
                - |
                  set -euo pipefail
                  log() { echo "[$(date -u +%H:%M:%S)] $*"; }
                  # Retry so the netpol/conntrack layer can open the connect path.
                  for i in $(seq 1 30); do
                    if pg_isready -h "$DB_HOST" -U "$DB_USERNAME" -d "$DB_NAME" -t 3 >/dev/null 2>&1; then
                      log "pg_isready ok after ${i} attempt(s)"
                      break
                    fi
                    log "pg_isready attempt=${i} failed, retrying in 5s..."
                    sleep 5
                    if [ "$i" = "30" ]; then log "pg_isready FAILED after 30 attempts"; exit 71; fi
                  done
                  export RCLONE_CONFIG_S3_TYPE=s3
                  export RCLONE_CONFIG_S3_ACCESS_KEY_ID="$S3_ACCESS_KEY_ID"
                  export RCLONE_CONFIG_S3_SECRET_ACCESS_KEY="$S3_SECRET_ACCESS_KEY"
                  export RCLONE_CONFIG_S3_ENDPOINT="$S3_ENDPOINT"
                  export RCLONE_CONFIG_S3_NO_CHECK_BUCKET=true
                  day=$(date -u +%Y-%m-%d)
                  week=$(date -u +%G-W%V)
                  upload() {
                    target="$1"
                    log "backup.start target=$target"
                    pg_dump -h "$DB_HOST" -U "$DB_USERNAME" --no-owner --no-privileges "$DB_NAME" \
                      | gzip -9 \
                      | gpg --batch --yes --quiet --symmetric --cipher-algo AES256 \
                            --passphrase-fd 3 3<<<"$BACKUP_GPG_PASSPHRASE" \
                      | rclone rcat "s3:${S3_BUCKET}/${target}"
                    size=$(rclone size --json "s3:${S3_BUCKET}/${target}" 2>/dev/null | grep -o '"bytes":[0-9]*' | head -1 | cut -d: -f2 || echo 0)
                    if [ "${size:-0}" -lt 1024 ]; then log "backup.fail target=$target size=$size"; exit 65; fi
                    log "backup.ok target=$target size=$size"
                  }
                  upload "postgres/daily/pg-${DB_NAME}-${day}.sql.gz.gpg"
                  if [ "$(date -u +%u)" = "7" ]; then upload "postgres/weekly/pg-${DB_NAME}-${week}.sql.gz.gpg"; fi
                  log "backup.done date=$day"
          volumes:
            - { name: tmp, emptyDir: {} }
            - { name: rclone-config, emptyDir: {} }
            - { name: gnupg, emptyDir: {} }
