# s3_* values point at any S3-compatible bucket. Seal; do not commit this file.
apiVersion: v1
kind: Secret
metadata:
  name: app-backup
  namespace: app
type: Opaque
stringData:
  gpg_passphrase: CHANGE_ME
  s3_access_key_id: CHANGE_ME
  s3_secret_access_key: CHANGE_ME
  s3_bucket: CHANGE_ME
  s3_endpoint: https://CHANGE_ME.r2.cloudflarestorage.com
