# //////////////////////////////////////////////////////////////////////////
# MEILISEARCH
# Single-replica search index StatefulSet
# //////////////////////////////////////////////////////////////////////////
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: meilisearch
  namespace: app
  labels:
    app.kubernetes.io/name: meilisearch
    app.kubernetes.io/part-of: app
spec:
  serviceName: meilisearch
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: meilisearch
  template:
    metadata:
      labels:
        app.kubernetes.io/name: meilisearch
        app.kubernetes.io/part-of: app
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: meilisearch
          image: getmeili/meilisearch:v1.11
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          env:
            - name: MEILI_ENV
              value: production
            - name: MEILI_DB_PATH
              value: /meili_data/data.ms
            - name: MEILI_DUMP_DIR
              value: /meili_data/dumps
            - name: MEILI_NO_ANALYTICS
              value: "true"
            - name: TMPDIR
              value: /tmp
            - name: MEILI_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: app-meilisearch
                  key: MEILI_MASTER_KEY
          ports:
            - name: http
              containerPort: 7700
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 768Mi
          startupProbe:
            httpGet:
              path: /health
              port: http
            failureThreshold: 30
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: data
              mountPath: /meili_data
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 512Mi
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: local-path
        resources:
          requests:
            storage: 5Gi
