# //////////////////////////////////////////////////////////////////////////
# REDIS SERVICE
# Headless Service for the StatefulSet
# //////////////////////////////////////////////////////////////////////////
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: app
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/part-of: app
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: redis
  ports:
    - name: redis
      port: 6379
      targetPort: redis
