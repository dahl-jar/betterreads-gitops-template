# //////////////////////////////////////////////////////////////////////////
# CLOUDFLARED
# Two-replica outbound tunnel connector
# //////////////////////////////////////////////////////////////////////////
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflared
  namespace: cloudflared
  labels:
    app.kubernetes.io/name: cloudflared
    app.kubernetes.io/part-of: platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: cloudflared
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cloudflared
        app.kubernetes.io/part-of: platform
    spec:
      containers:
        - name: cloudflared
          image: cloudflare/cloudflared:2025.5.0
          args: ["tunnel", "--config", "/etc/cloudflared/config/config.yaml", "run"]
          livenessProbe:
            httpGet:
              path: /ready
              port: 2000
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              memory: 128Mi
          volumeMounts:
            - name: config
              mountPath: /etc/cloudflared/config
              readOnly: true
            - name: creds
              mountPath: /etc/cloudflared/creds
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: cloudflared
        - name: creds
          secret:
            secretName: cloudflared-creds
